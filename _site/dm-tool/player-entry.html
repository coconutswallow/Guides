    <style>
        /* Layout Overrides */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: var(--page-bg-image, none);
            padding-top: 40px;
        }
        
        .entry-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        .auth-header-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .session-info {
            text-align: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--color-border);
        }
        
        .session-name {
            font-family: var(--font-header);
            font-size: 1.8rem;
            color: var(--color-primary);
            line-height: 1.2;
            margin-bottom: 0.5rem;
            min-height: 2rem;
        }
        
        .dm-name {
            color: var(--color-text-secondary);
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Message shown when not logged in */
        #guest-message {
            text-align: center;
            color: var(--color-text-secondary);
            padding: 2rem;
            font-style: italic;
        }

        .hidden { display: none !important; }
        
        .skeleton {
            color: transparent !important;
            background-color: var(--color-bg-medium);
            border-radius: 4px;
            animation: pulse 1.5s infinite;
            pointer-events: none;
            user-select: none;
        }

        /* Incentives Card Styling */
        .incentives-card {
            background: var(--color-bg-light); /* Matches card background */
            border: 2px solid var(--color-primary); /* Distinct border */
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .incentives-header {
            font-weight: bold;
            color: var(--color-primary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }

        .checkbox-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95em;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        
        .checkbox-item:hover {
            background: var(--color-bg-medium);
        }
        
        .checkbox-item input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }
    </style>
</head>

/* THEMING:

}

.auth-avatar {

    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--color-primary, #58180D);
    background-color: white; /* Ensures transparent SVGs look okay */
}

.auth-user-info {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
}

.auth-name {
    font-weight: 700;
    font-size: 0.9em;

</style>

<script>
(function () {
    const getEl = (id) => document.getElementById(id);

    const ui = {
        loading: getEl('auth-loading'),
        loginBtn: getEl('login-btn'),
        profile: getEl('user-profile'),
        avatar: getEl('user-avatar'),
        name: getEl('user-name'),
        logoutBtn: getEl('logout-btn')
    };

    /**
     * Updates the DOM based on the user state.
     * @param {Object|null} user - The Supabase user object or null.
     */
    const updateAuthUI = (user) => {
        if(!ui.loading) return; // Safety check if DOM is missing
        
        ui.loading.style.display = 'none';

        if (!user) {
            // Logged out state
            ui.loginBtn.style.display = 'inline-flex';
            ui.profile.style.display = 'none';
        } else {
            // Logged in state
            ui.loginBtn.style.display = 'none';
            ui.profile.style.display = 'flex';

            // Use Supabase/Discord metadata
            ui.name.textContent = user.user_metadata?.full_name || 'Adventurer';

            if (user.user_metadata?.avatar_url) {
                ui.avatar.src = user.user_metadata.avatar_url;
                ui.avatar.style.display = 'block';
            }
        }

        // Hook for page-specific logic (e.g. AuthGuard)
        if (typeof window.handlePageAuth === 'function') {
            window.handlePageAuth(user);
        }
    };

    // Polling configuration
    let pollCount = 0;
    const MAX_POLLS = 50; // 50 * 100ms = 5 seconds max wait time

    const initAuth = () => {
        // Wait for authManager to load from the other script
        if (!window.authManager) {
            pollCount++;
            if (pollCount > MAX_POLLS) {
                console.warn("Auth: Failed to load authManager within 5 seconds.");
                if(ui.loading) ui.loading.textContent = "Auth Error";
                return;
            }
            setTimeout(initAuth, 100);
            return;
        }

        ui.loginBtn.onclick = () => window.authManager.login();
        ui.logoutBtn.onclick = () => window.authManager.logout();
        
        // Initialize the manager, passing our UI updater callback
        window.authManager.init(updateAuthUI);
    };

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initAuth);
    } else {
        initAuth();
    }
})();
</script>

<script type="module" src="/Guides/assets/js/auth-manager.js"></script>
<script type="module">
    import { supabase } from "/Guides/assets/js/supabaseClient.js";

    // GLOBAL UI REFERENCES
    const ui = {
        sessionName: document.getElementById('display-session-name'),
        dmNameContainer: document.querySelector('.dm-name'), 
        dmNameSpan: document.getElementById('display-dm-name'),
        status: document.getElementById('status-message'),
        incentivesContainer: document.getElementById('incentives-container')
    };

    // 0. PATCH AUTH LOGIN (Preserves Session ID in URL)
    const patchLogin = () => {
        if(window.authManager) {
            window.authManager.login = async function() {
                // FIX: Strip the hash (#) from the current URL to prevent double hashes (##) on re-login
                const currentUrl = window.location.origin + window.location.pathname + window.location.search;
                
                await this.client.auth.signInWithOAuth({
                    provider: 'discord',
                    options: { redirectTo: currentUrl, scopes: 'guilds guilds.members.read' }
                });
            };
        } else {
            setTimeout(patchLogin, 50);
        }
    };
    patchLogin();

    // 1. GLOBAL UI HANDLERS (Theme, Tabs)
    const toggleBtn = document.getElementById('theme-toggle');
    const htmlEl = document.documentElement;
    
    if (localStorage.getItem('theme') === 'dark') htmlEl.setAttribute('data-theme', 'dark');

    toggleBtn.addEventListener('click', () => {
        const currentTheme = htmlEl.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        htmlEl.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    });

    document.querySelectorAll('.content-tab').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.content-tab').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.tab).classList.remove('hidden');
        });
    });

    // 2. PAGE AUTH HOOK
    window.handlePageAuth = async function(user) {
        const formSection = document.getElementById('form-section');
        const currentPlayer = document.getElementById('current-player-display');
        const discordIdInput = document.getElementById('p-discord-id');
        const displayNameInput = document.getElementById('p-display-name');

        if (user) {
            // === AUTHENTICATED STATE ===
            ui.sessionName.classList.add('skeleton');
            ui.sessionName.style.fontSize = ""; 
            ui.sessionName.style.color = "";    
            ui.dmNameContainer.style.display = 'block'; 

            fetchSessionMetadata();
            fetchIncentivesOptions(); // Fetch lookups

            try {
                const { data: userData, error: userError } = await supabase
                    .from('discord_users')
                    .select('discord_id, display_name')
                    .eq('user_id', user.id)
                    .single();

                if (userError || !userData) {
                    console.error("Identity Error:", userError);
                    currentPlayer.textContent = "Error loading Identity";
                    return;
                }

                currentPlayer.textContent = `${userData.display_name} (Verified)`;
                discordIdInput.value = userData.discord_id;
                displayNameInput.value = userData.display_name;

                // Load existing data AFTER fetching incentives to ensure checkboxes exist
                setTimeout(() => {
                    loadPlayerData(userData.discord_id);
                }, 500);
                
                formSection.classList.remove('hidden');

            } catch (err) {
                console.error("Auth Logic Error:", err);
            }
        } else {
            // === GUEST / LOGGED OUT STATE ===
            ui.sessionName.textContent = "A DM has invited you to join their game! Login to enter your character and session details";
            ui.sessionName.classList.remove('skeleton');
            ui.sessionName.style.fontSize = "1.2rem";
            ui.sessionName.style.lineHeight = "1.5";
            ui.dmNameContainer.style.display = 'none';
            formSection.classList.add('hidden');
        }
    };

    // 3. INITIALIZATION
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session_id');

    if (!sessionId) {
        ui.sessionName.textContent = "Error: No Session ID";
        ui.sessionName.classList.remove('skeleton');
        ui.sessionName.style.color = "var(--palette-alert-danger-action)";
    }

    // 4. DATA FUNCTIONS
    async function fetchSessionMetadata() {
        if(!sessionId) return;
        try {
            const { data: session, error: sErr } = await supabase
                .from('session_logs')
                .select('title, user_id') 
                .eq('id', sessionId)
                .single();

            if (sErr || !session) throw sErr;

            ui.sessionName.textContent = session.title;
            ui.sessionName.classList.remove('skeleton');

            if (session.user_id) {
                const { data: dm } = await supabase
                    .from('discord_users')
                    .select('display_name')
                    .eq('user_id', session.user_id)
                    .single();
                
                ui.dmNameSpan.textContent = dm ? dm.display_name : "Unknown DM";
            } else {
                ui.dmNameSpan.textContent = "N/A";
            }
            ui.dmNameSpan.classList.remove('skeleton');

        } catch (err) {
            console.warn("Session Fetch Error:", err.message);
        }
    }

    async function fetchIncentivesOptions() {
        try {
            const { data, error } = await supabase
                .from('lookups')
                .select('data')
                .eq('type', 'dm-tool')
                .single();

            if (error || !data || !data.data || !data.data['player incentives']) {
                ui.incentivesContainer.innerHTML = '<div style="color:var(--color-text-secondary); padding:5px; font-style:italic;">None active for this season.</div>';
                return;
            }

            const incentivesMap = data.data['player incentives'];
            const incentiveKeys = Object.keys(incentivesMap);

            if (incentiveKeys.length === 0) {
                 ui.incentivesContainer.innerHTML = '<div style="color:var(--color-text-secondary); padding:5px; font-style:italic;">None active for this season.</div>';
                 return;
            }

            // Build Checkboxes
            let html = '';
            incentiveKeys.forEach(key => {
                html += `
                    <label class="checkbox-item">
                        <input type="checkbox" name="incentive" value="${key}">
                        ${key}
                    </label>
                `;
            });
            ui.incentivesContainer.innerHTML = html;

        } catch (e) {
            console.error("Error fetching incentives:", e);
            ui.incentivesContainer.innerHTML = '<div style="color:var(--palette-alert-danger-action); font-size:0.9em;">Error loading options.</div>';
        }
    }

    async function loadPlayerData(discordId) {
        if(!sessionId || !discordId) return;

        try {
            const { data, error } = await supabase
                .from('session_player_submissions')
                .select('payload')
                .eq('session_id', sessionId)
                .eq('discord_id', discordId)
                .maybeSingle();

            if (data && data.payload) {
                populateForm(data.payload);
            }
        } catch (err) {
            console.error("Load Player Data Error", err);
        }
    }

    function populateForm(p) {
        if(p.char_name) document.getElementById('p-char-name').value = p.char_name;
        if(p.level) document.getElementById('p-level').value = p.level;
        if(p.level_as) document.getElementById('p-level-as').value = p.level_as;
        if(p.games) document.getElementById('p-games').value = p.games;
        if(p.loot) document.getElementById('p-loot').value = p.loot;
        if(p.gold) document.getElementById('p-gold').value = p.gold;
        if(p.gold_used) document.getElementById('p-gold-used').value = p.gold_used;
        if(p.items) document.getElementById('p-items').value = p.items;
        if(p.notes) document.getElementById('p-notes').value = p.notes;
        
        // Populate Incentives Checkboxes
        if (p.incentives && Array.isArray(p.incentives)) {
            const checkboxes = document.querySelectorAll('input[name="incentive"]');
            checkboxes.forEach(cb => {
                if (p.incentives.includes(cb.value)) {
                    cb.checked = true;
                }
            });
        }
    }

    document.getElementById('btn-submit').addEventListener('click', async () => {
        const discordId = document.getElementById('p-discord-id').value;
        const displayName = document.getElementById('p-display-name').value;
        
        if (!discordId) {
            alert("Error: Missing verified identity. Please refresh.");
            return;
        }

        // VALIDATION: Level Range 1-20
        const level = parseInt(document.getElementById('p-level').value);
        const levelAsInput = document.getElementById('p-level-as').value;
        
        if (level < 1 || level > 20 || isNaN(level)) {
            alert("Character Level must be between 1 and 20.");
            return;
        }

        // OPTIONAL: Playing As validation (Only check if not empty)
        let levelAs = null;
        if(levelAsInput.trim() !== "") {
            const val = parseInt(levelAsInput);
            if (val < 1 || val > 20 || isNaN(val)) {
                alert("'Playing As' level must be between 1 and 20 (or left blank).");
                return;
            }
            levelAs = val;
        }

        // Collect Selected Incentives
        const selectedIncentives = [];
        document.querySelectorAll('input[name="incentive"]:checked').forEach(cb => {
            selectedIncentives.push(cb.value);
        });

        const payload = {
            display_name: displayName,
            char_name: document.getElementById('p-char-name').value,
            level: level,
            level_as: levelAs, // Can be null now
            games: document.getElementById('p-games').value,
            loot: document.getElementById('p-loot').value,
            gold: document.getElementById('p-gold').value,
            gold_used: document.getElementById('p-gold-used').value, 
            items: document.getElementById('p-items').value,
            incentives: selectedIncentives,
            notes: document.getElementById('p-notes').value
        };

        ui.status.textContent = "Saving...";
        ui.status.style.color = "var(--palette-role-auditor)";

        try {
            const { error } = await supabase
                .from('session_player_submissions')
                .upsert({ 
                    session_id: sessionId,
                    discord_id: discordId,
                    payload: payload,
                    updated_at: new Date().toISOString()
                }, { onConflict: 'session_id, discord_id' });

            if(error) throw error;

            ui.status.textContent = "Saved successfully!";
            ui.status.style.color = "var(--palette-role-full-dm)";
            setTimeout(() => { ui.status.textContent = ""; }, 3000);

        } catch (err) {
            console.error(err);
            ui.status.textContent = "Error saving data.";
            ui.status.style.color = "var(--palette-alert-danger-action)";
        }
    });
</script>

</body>
</html>
