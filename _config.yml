# Site settings
title: "Hawthorne Guild"
description: "Comprehensive guide for the Hawthorne D&D Guild"
baseurl: "/Guides"
url: "https://coconutswallow.github.io"

include:
  - ".context"
  - ".agent"

# Collections for different guide sections
collections:
  rules:
    output: true
    permalink: /rules/:path/
  playersguide:
    output: true
    permalink: /playersguide/:path/
  dmsguide:
    output: true
    permalink: /dmsguide/:path/
  dms_appendices:
    output: true
    permalink: /dmsguide/appendices/:path/
  faq:
    output: true
    permalink: /faq/:path/
  help:
    output: true
    permalink: /help/:path/
  resources:
    output: true
    permalink: /resources/:path/
  lore:
    output: true
    permalink: /lore/:path/
  arcana:
    output: true
    permalink: /arcana/:path/
  player_resources:
    output: true
    permalink: /player-resources/:path/
  dm_resources:
    output: true
    permalink: /dm-resources/:path/
  adventure_locations:
    output: true
    permalink: /field-guide/adventure-locations/:path/

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-relative-links
